<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="50%" stop-color="#45B7D1"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hexagon edges -->
  <line x1="100" y1="35" x2="155" y2="67.5" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
  <line x1="155" y1="67.5" x2="155" y2="132.5" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
  <line x1="155" y1="132.5" x2="100" y2="165" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
  <line x1="100" y1="165" x2="45" y2="132.5" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
  <line x1="45" y1="132.5" x2="45" y2="67.5" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
  <line x1="45" y1="67.5" x2="100" y2="35" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" opacity="0.65"/>

  <!-- Spokes to center -->
  <line x1="100" y1="35" x2="100" y2="100" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.38"/>
  <line x1="155" y1="67.5" x2="100" y2="100" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.38"/>
  <line x1="155" y1="132.5" x2="100" y2="100" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.38"/>
  <line x1="100" y1="165" x2="100" y2="100" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.38"/>
  <line x1="45" y1="132.5" x2="100" y2="100" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.38"/>
  <line x1="45" y1="67.5" x2="100" y2="100" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.38"/>

  <!-- Outer nodes — each with unique color -->
  <circle cx="100" cy="35"   r="12" fill="#4ECDC4" filter="url(#glow)"/>
  <circle cx="100" cy="35"   r="6.5" fill="white" opacity="0.55"/>

  <circle cx="155" cy="67.5"  r="12" fill="#45B7D1" filter="url(#glow)"/>
  <circle cx="155" cy="67.5"  r="6.5" fill="white" opacity="0.55"/>

  <circle cx="155" cy="132.5" r="12" fill="#7B8EE8" filter="url(#glow)"/>
  <circle cx="155" cy="132.5" r="6.5" fill="white" opacity="0.55"/>

  <circle cx="100" cy="165"  r="12" fill="#6C5CE7" filter="url(#glow)"/>
  <circle cx="100" cy="165"  r="6.5" fill="white" opacity="0.55"/>

  <circle cx="45"  cy="132.5" r="12" fill="#9B72EF" filter="url(#glow)"/>
  <circle cx="45"  cy="132.5" r="6.5" fill="white" opacity="0.55"/>

  <circle cx="45"  cy="67.5"  r="12" fill="#F4956A" filter="url(#glow)"/>
  <circle cx="45"  cy="67.5"  r="6.5" fill="white" opacity="0.55"/>

  <!-- Center node -->
  <circle cx="100" cy="100" r="17" fill="url(#grad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="10" fill="white" opacity="0.3"/>
</svg>
